name: 'publish'
on:
    push:
        branches:
            - main
permissions:
    contents: write
    id-token: write
    pull-requests: write
    issues: write
jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
            - run: yarn install
            - run: yarn test:ci
            - run: yarn build
            - run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
            - uses: codecov/codecov-action@v4
              with:
                  file: coverage/lcov.info
