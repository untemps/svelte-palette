name: 'publish'
on:
    push:
        branches:
            - main
            - beta
jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 20
            - run: yarn install
            - run: yarn test:ci
            - run: yarn build
            - run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
            - uses: codecov/codecov-action@v5
              with:
                  directory: ./coverage/
